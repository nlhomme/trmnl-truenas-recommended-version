name: Update heartbeat.json

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 */12 * * *' # every 12 hours
  workflow_dispatch:

concurrency:
  group: heartbeat-json
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false

      - name: Configure git credentials
        run: |
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm install --no-save js-yaml@4

      - name: Fetch TrueNAS versions and build heartbeat
        run: |
          node - <<'SCRIPT'
          const fs = require('fs');
          const yaml = require('js-yaml');

          const YAML_URL = 'https://raw.githubusercontent.com/truenas/documentation/master/data/software_status_config.yaml';

          const PROFILE_ORDER = ['developer', 'early_adopter', 'general', 'mission_critical'];
          const PROFILE_LABELS = {
            developer: 'Developer',
            early_adopter: 'Early Adopter',
            general: 'General',
            mission_critical: 'Mission Critical',
          };

          function extractVersions(doc) {
            const tableData = doc && doc.table_data;
            if (!tableData || typeof tableData !== 'object') {
              return [{ profile: 'Error', enterprise: 'YAML missing table_data', community: '' }];
            }

            const versions = PROFILE_ORDER
              .filter((key) => tableData[key])
              .map((key) => ({
                profile: PROFILE_LABELS[key] || key,
                enterprise: (tableData[key].enterprise && tableData[key].enterprise.version) || '',
                community: (tableData[key].community && tableData[key].community.version) || '',
              }));

            return versions.length > 0
              ? versions
              : [{ profile: 'Error', enterprise: 'No profiles found in YAML', community: '' }];
          }

          (async () => {
            let yamlText;
            try {
              const res = await fetch(YAML_URL, {
                headers: { 'User-Agent': 'TRMNL-TrueNAS-Plugin/1.0' },
              });
              if (!res.ok) {
                console.error(`[heartbeat] YAML fetch returned ${res.status}`);
                process.exit(1);
              }
              yamlText = await res.text();
            } catch (err) {
              console.error('[heartbeat] Failed to fetch YAML:', err.message);
              process.exit(1);
            }

            let doc;
            try {
              doc = yaml.load(yamlText);
            } catch (err) {
              console.error('[heartbeat] Failed to parse YAML:', err.message);
              process.exit(1);
            }

            const versions = extractVersions(doc);

            const heartbeat = {
              merge_variables: {
                versions,
                refreshed_at: new Date().toLocaleString('en-US', {
                  timeZone: 'UTC',
                  day: 'numeric',
                  month: 'short',
                  hour: '2-digit',
                  minute: '2-digit',
                  timeZoneName: 'short',
                }),
              },
            };

            // Only write if data actually changed
            let existing = null;
            try {
              existing = fs.readFileSync('heartbeat.json', 'utf8');
            } catch {}

            const newContent = JSON.stringify(heartbeat);

            // Compare versions only (ignore refreshed_at timestamp)
            let changed = true;
            if (existing) {
              try {
                const old = JSON.parse(existing);
                changed = JSON.stringify(old.merge_variables.versions) !== JSON.stringify(heartbeat.merge_variables.versions);
              } catch {}
            }

            if (changed) {
              fs.writeFileSync('heartbeat.json', newContent);
              console.log('[heartbeat] versions changed, heartbeat.json updated');
              console.log(JSON.stringify(heartbeat, null, 2));
            } else {
              // Update timestamp even if versions unchanged, but flag no-change
              fs.writeFileSync('heartbeat.json', newContent);
              console.log('[heartbeat] versions unchanged, updating timestamp only');
              // Set env var so commit step can skip
              fs.appendFileSync(process.env.GITHUB_ENV, 'VERSIONS_CHANGED=false\n');
            }
          })();
          SCRIPT

      - name: Create PR (only if versions changed)
        if: env.VERSIONS_CHANGED != 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add heartbeat.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0

          BRANCH="heartbeat/update-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: update recommended versions"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: update recommended versions" \
            --body "Automated heartbeat update — recommended versions have changed."

          gh pr merge "$BRANCH" --squash --delete-branch