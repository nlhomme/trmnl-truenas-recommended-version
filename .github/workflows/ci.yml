name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Validate heartbeat.json
        run: |
          if [ ! -f heartbeat.json ]; then
            echo "heartbeat.json not found"
            exit 1
          fi
          node -e "
            const data = JSON.parse(require('fs').readFileSync('heartbeat.json', 'utf8'));
            if (!data.merge_variables) {
              console.error('Missing merge_variables wrapper');
              process.exit(1);
            }
            console.log('heartbeat.json is valid');
          "
